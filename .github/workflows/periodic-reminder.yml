name: Send Periodic Messages

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  periodic-broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send Periodic Messages
        run: node .github/scripts/send-periodic.js
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MSG91_AUTH_KEY: ${{ secrets.MSG91_AUTH_KEY }}
          MSG91_TEMPLATE_ID: ${{ secrets.MSG91_TEMPLATE_ID }}
          MSG91_SENDER_ID: ${{ secrets.MSG91_SENDER_ID }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RECIPIENT_PHONE: ${{ secrets.RECIPIENT_PHONE }}
